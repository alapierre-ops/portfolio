<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1080" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <linearGradient id="ps-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1424"/>
      <stop offset="1" stop-color="#0b1a2e"/>
    </linearGradient>
  </defs>
  <rect width="900" height="1080" rx="18" fill="url(#ps-bg)"/>
  <text x="40" y="56" fill="#e2e8f0" font-size="30" font-weight="800">ProspectScope — batch pipeline</text>
  <text x="40" y="90" fill="#22d3ee" font-size="19" font-weight="600">Runs every night · AWS EC2 · fully automated</text>

  <!-- spine -->
  <line x1="70" y1="150" x2="70" y2="918" stroke="#1e3a5f" stroke-width="4"/>

  <!-- 1 -->
  <circle cx="70" cy="150" r="20" fill="#0ea5e9"/><text x="70" y="157" text-anchor="middle" fill="#04121f" font-size="18" font-weight="700">1</text>
  <rect x="118" y="104" width="742" height="92" rx="14" fill="#0f1b2d" stroke="#1e293b"/>
  <text x="150" y="142" fill="#e2e8f0" font-size="24" font-weight="700">Sources</text>
  <text x="150" y="174" fill="#7dd3fc" font-size="17">AFNIC .fr open data · INPI new companies</text>

  <!-- 2 -->
  <circle cx="70" cy="278" r="20" fill="#0ea5e9"/><text x="70" y="285" text-anchor="middle" fill="#04121f" font-size="18" font-weight="700">2</text>
  <rect x="118" y="232" width="742" height="92" rx="14" fill="#0f1b2d" stroke="#1e293b"/>
  <text x="150" y="270" fill="#e2e8f0" font-size="24" font-weight="700">Enrichment</text>
  <text x="150" y="302" fill="#7dd3fc" font-size="17">WHOIS / RDAP · LinkedIn (Google CSE) · Kaspr</text>

  <!-- 3 -->
  <circle cx="70" cy="406" r="20" fill="#0ea5e9"/><text x="70" y="413" text-anchor="middle" fill="#04121f" font-size="18" font-weight="700">3</text>
  <rect x="118" y="360" width="742" height="92" rx="14" fill="#0f1b2d" stroke="#1e293b"/>
  <text x="150" y="398" fill="#e2e8f0" font-size="24" font-weight="700">Dedup + blacklist</text>
  <text x="150" y="430" fill="#7dd3fc" font-size="17">idempotent · opt-out / GDPR enforced on every export</text>

  <!-- 4 -->
  <circle cx="70" cy="534" r="20" fill="#0ea5e9"/><text x="70" y="541" text-anchor="middle" fill="#04121f" font-size="18" font-weight="700">4</text>
  <rect x="118" y="488" width="742" height="92" rx="14" fill="#0f1b2d" stroke="#1e293b"/>
  <text x="150" y="526" fill="#e2e8f0" font-size="24" font-weight="700">Verification</text>
  <text x="150" y="558" fill="#7dd3fc" font-size="17">Million Verifier · bounce kept under 1%</text>

  <!-- 5 -->
  <circle cx="70" cy="662" r="20" fill="#22c55e"/><text x="70" y="669" text-anchor="middle" fill="#04121f" font-size="18" font-weight="700">5</text>
  <rect x="118" y="616" width="742" height="92" rx="14" fill="#0f1b2d" stroke="#1e293b"/>
  <text x="150" y="654" fill="#e2e8f0" font-size="24" font-weight="700">CSV export</text>
  <text x="150" y="686" fill="#86efac" font-size="17">qualified, ready-to-send leads</text>

  <!-- 6 -->
  <circle cx="70" cy="790" r="20" fill="#818cf8"/><text x="70" y="797" text-anchor="middle" fill="#04121f" font-size="18" font-weight="700">6</text>
  <rect x="118" y="744" width="742" height="92" rx="14" fill="#0f1b2d" stroke="#1e293b"/>
  <text x="150" y="782" fill="#e2e8f0" font-size="24" font-weight="700">SmartLead</text>
  <text x="150" y="814" fill="#c4b5fd" font-size="17">automatic campaign creation from a template</text>

  <!-- 7 -->
  <circle cx="70" cy="918" r="20" fill="#818cf8"/><text x="70" y="925" text-anchor="middle" fill="#04121f" font-size="18" font-weight="700">7</text>
  <rect x="118" y="872" width="742" height="92" rx="14" fill="#0f1b2d" stroke="#1e293b"/>
  <text x="150" y="910" fill="#e2e8f0" font-size="24" font-weight="700">HubSpot</text>
  <text x="150" y="942" fill="#c4b5fd" font-size="17">lead import · follow-up tasks</text>

  <!-- callout -->
  <rect x="40" y="988" width="820" height="66" rx="14" fill="#132132" stroke="#0ea5e9" stroke-opacity="0.5"/>
  <text x="66" y="1018" fill="#38bdf8" font-size="18" font-weight="700">Safeguards</text>
  <text x="66" y="1042" fill="#94a3b8" font-size="16">Nightly cron · end-to-end preflight self-test before each run · webhook sync with DomainRadar</text>
</svg>
